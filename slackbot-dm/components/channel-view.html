<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Channel View Component</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --sk-font: 'Lato', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans', sans-serif;
      --sk-primary-text: #1D1C1D;
      --sk-white: #FFFFFF;
      --sk-content-secondary: #454447;
      --sk-content-tertiary: #7C7A7F;
      --sk-border-subtle: rgba(94, 93, 96, 0.13);
      --sk-border-medium: rgba(94, 93, 96, 0.45);
      --sk-surface-hover: #F5F5F5;
      --sk-theme-base-primary: #F9EDFF;
      --sk-theme-inverse-secondary: #83388A;
      --sk-base-tertiary: #EAEAEA;
      --sk-radius-sm: 4px;
      --sk-radius-md: 8px;
      --sk-radius-circle: 50%;
      --sk-duration-fast: 0.125s;
      --sk-ease-productive: cubic-bezier(0.165, 0.84, 0.44, 1);
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      margin: 0;
      height: 100%;
      background: #FFFFFF;
      overflow: hidden;
      font-family: var(--sk-font);
      color: var(--sk-primary-text);
      -webkit-font-smoothing: antialiased;
      font-size: 15px;
      line-height: 1.4;
    }

    /* === Layout === */
    .channel-view {
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }

    /* === Channel Title Bar === */
    .channel-title-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      height: 50px;
      flex-shrink: 0;
    }

    .channel-title-left {
      display: flex;
      align-items: center;
      gap: 4px;
      flex: 1;
      min-width: 0;
    }

    .channel-title-name-wrap {
      display: flex;
      align-items: center;
      height: 32px;
      padding: 0 4px;
      border-radius: 8px;
    }

    .channel-title-decoration {
      display: flex;
      align-items: center;
      padding: 4px;
    }

    .channel-title-name {
      font-size: 18px;
      font-weight: 900;
      color: var(--sk-content-tertiary);
      line-height: 27px;
    }

    .channel-title-edit {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2.857px;
      border-radius: 8px;
      background: white;
    }

    .channel-title-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Huddle button group */
    .channel-btn-group {
      display: flex;
      align-items: center;
      border: 1px solid var(--sk-border-subtle);
      border-radius: 8px;
      overflow: hidden;
      height: 28px;
      background: white;
    }

    .channel-btn-huddle {
      display: flex;
      align-items: center;
      gap: 4px;
      height: 100%;
      padding: 0 8px;
      border: none;
      background: none;
      cursor: pointer;
      font-family: var(--sk-font);
    }

    .channel-btn-huddle svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .channel-btn-huddle-caret {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 0 4px;
      border: none;
      background: none;
      cursor: pointer;
      position: relative;
    }

    .channel-btn-huddle-caret::before {
      content: '';
      position: absolute;
      left: 0;
      top: 4px;
      bottom: 4px;
      width: 1px;
      background: var(--sk-border-subtle);
    }

    /* Invite teammates button */
    .channel-btn-invite {
      display: flex;
      align-items: center;
      gap: 4px;
      height: 28px;
      padding: 0 10px;
      border: 1px solid var(--sk-border-subtle);
      border-radius: 8px;
      background: white;
      cursor: pointer;
      font-family: var(--sk-font);
      font-size: 13px;
      font-weight: 700;
      color: var(--sk-primary-text);
    }

    .channel-btn-invite svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    /* Icon buttons (bell, search, kebab) */
    .channel-btn-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: none;
      border: none;
      cursor: pointer;
    }

    .channel-btn-icon:hover {
      background: var(--sk-surface-hover);
    }

    /* === Channel Tabs === */
    .channel-tabs {
      display: flex;
      align-items: center;
      padding: 0 16px;
      height: 36px;
      flex-shrink: 0;
    }

    .channel-tabs-inner {
      display: flex;
      align-items: center;
      gap: 12px;
      height: 100%;
    }

    .channel-tab {
      display: flex;
      align-items: center;
      gap: 2px;
      padding: 11px 4px;
      height: 100%;
      font-size: 13px;
      font-weight: 700;
      color: var(--sk-primary-text);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      border-radius: 4px 4px 0 0;
    }

    .channel-tab.active {
      border-bottom-color: var(--sk-theme-inverse-secondary);
    }

    .channel-tab-add {
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    /* === Conversation Area === */
    .channel-conversation {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      min-height: 0;
    }

    .channel-conversation-top {
      background: linear-gradient(180deg, #f9edff 0%, #ffffff 60%);
      padding: 32px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      justify-content: flex-end;
      flex: 1;
      min-height: 0;
    }

    .channel-intro-title {
      font-size: 28px;
      font-weight: 900;
      color: var(--sk-primary-text);
      line-height: 34px;
    }

    .channel-intro-desc {
      font-size: 15px;
      font-weight: 400;
      color: var(--sk-content-secondary);
      line-height: 22px;
    }

    /* === Action Cards === */
    .channel-action-cards {
      display: flex;
      gap: 16px;
      padding: 16px 0;
    }

    .channel-action-card {
      width: 180px;
      min-width: 180px;
      max-width: 180px;
      flex-shrink: 0;
      cursor: pointer;
      transition: transform 0.15s var(--sk-ease-productive);
    }

    .channel-action-card:hover {
      transform: translateY(-4px);
    }

    .channel-action-card:active {
      transform: translateY(-1px);
    }

    .channel-action-card img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* === Timeline Divider === */
    .channel-timeline {
      height: 36px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }

    .channel-timeline-line {
      position: absolute;
      left: 0;
      right: 0;
      top: calc(50% + 0.5px);
      height: 1px;
      background: rgba(29, 28, 29, 0.13);
    }

    .channel-timeline-pill {
      position: relative;
      display: flex;
      align-items: center;
      padding: 4px 8px 4px 16px;
      font-size: 13px;
      font-weight: 700;
      color: var(--sk-primary-text);
      line-height: 18px;
      background: white;
      border: 1px solid #ddd;
      border-radius: 32px;
    }

    .channel-timeline-pill svg {
      width: 20px;
      height: 20px;
    }

    /* === Message === */
    .channel-message {
      display: flex;
      gap: 8px;
      padding: 8px 20px;
      background: white;
      flex-shrink: 0;
    }

    .channel-message-avatar {
      width: 36px;
      height: 36px;
      border-radius: 4px;
      flex-shrink: 0;
      overflow: hidden;
    }

    .channel-message-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 8px;
    }

    .channel-message-content {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-width: 0;
    }

    .channel-message-header {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      height: 18px;
    }

    .channel-message-name {
      font-size: 15px;
      font-weight: 900;
      color: var(--sk-primary-text);
      line-height: 22px;
    }

    .channel-message-time {
      font-size: 12px;
      font-weight: 400;
      color: rgba(29, 28, 29, 0.7);
      line-height: 18px;
      padding-top: 3px;
      padding-bottom: 1px;
    }

    .channel-message-text {
      font-size: 15px;
      font-weight: 400;
      color: var(--sk-content-tertiary);
      line-height: 22px;
    }

    /* === Composer === */
    .channel-composer {
      padding: 0 20px 24px;
      flex-shrink: 0;
    }

    .channel-composer-wrapper {
      background: #f9edff;
      border: 1px solid var(--sk-border-subtle);
      border-radius: 12px;
    }

    .channel-composer-inner {
      border: 1px solid var(--sk-border-medium);
      border-radius: 8px;
      background: var(--sk-white);
      overflow: hidden;
      box-shadow: 0px 1px 3px 0px rgba(0, 0, 0, 0.08);
    }

    .channel-composer-input {
      padding: 9px 12px 7px 12px;
      font-size: 15px;
      line-height: 22px;
      color: var(--sk-primary-text);
      outline: none;
      cursor: text;
    }

    .channel-composer-input:empty::before {
      content: attr(data-placeholder);
      color: var(--sk-content-tertiary);
      pointer-events: none;
    }

    .channel-composer-actions {
      display: flex;
      align-items: center;
      height: 40px;
    }

    .composer-actions-left {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 4px 4px 8px;
      height: 40px;
    }

    .composer-action-btn {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: none;
      border-radius: var(--sk-radius-sm);
      cursor: pointer;
      padding: 1px;
    }

    .composer-action-btn:hover { background: var(--sk-surface-hover); }

    .composer-action-btn-plus {
      border-radius: 24px;
    }

    .composer-divider {
      width: 9px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .composer-divider-line {
      width: 1px;
      height: 20px;
      background: var(--sk-border-subtle);
    }

    .composer-actions-right {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      flex: 1;
      padding: 6px;
    }

    .composer-send-group {
      display: flex;
      align-items: center;
      height: 28px;
      border-radius: var(--sk-radius-sm);
      background: var(--sk-white);
      overflow: hidden;
      transition: background 0.15s ease;
    }

    .composer-send-group.active {
      background: #007A5A;
    }

    .composer-send-group.active .composer-send-btn svg path,
    .composer-send-group.active .composer-send-caret svg path {
      fill: #FFFFFF;
      opacity: 1;
    }

    .composer-send-group.active .composer-send-divider-line {
      background: rgba(255, 255, 255, 0.3);
    }

    .composer-send-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 28px;
      border: none;
      background: none;
      cursor: pointer;
      padding: 0 8px;
    }

    .composer-send-divider {
      display: flex;
      align-items: center;
      height: 20px;
    }

    .composer-send-divider-line {
      width: 1px;
      height: 20px;
      background: var(--sk-border-subtle);
    }

    .composer-send-caret {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 28px;
      border: none;
      background: none;
      cursor: pointer;
    }

    /* Scrollbar styling */
    .channel-conversation::-webkit-scrollbar { width: 6px; }
    .channel-conversation::-webkit-scrollbar-track { background: transparent; }
    .channel-conversation::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }
  </style>
</head>
