<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slackbot Prototypes</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Lato', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 40px;
    }
    h1 {
      font-size: 32px;
      font-weight: 900;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 15px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 48px;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: center;
    }
    a {
      display: block;
      width: 280px;
      padding: 16px 24px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      color: #fff;
      text-decoration: none;
      font-size: 16px;
      font-weight: 700;
      transition: background 0.15s, border-color 0.15s;
    }
    a:hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.25);
    }
    a span {
      display: block;
      font-size: 13px;
      font-weight: 400;
      color: rgba(255,255,255,0.5);
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Slackbot Prototypes</h1>
    <p class="subtitle">Select a prototype to view</p>
    <div class="links">
      <a href="combined/index.html">
        Segmentation + Slackbot Landing
      </a>
    </div>
  </div>
</body>
</html>
